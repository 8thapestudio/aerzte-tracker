<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Ärzte Tracker — stress-optimized medical appointment tracker by 8th Ape Studio" />
  <meta name="theme-color" content="#050810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ärzte" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <title>Ärzte Tracker</title>
  <style>
    :root {
      --cyan:    #00f5ff;
      --mag:     #ff2d78;
      --amber:   #ffb830;
      --green:   #00ff9f;
      --bg:      #050810;
      --bg2:     #080d1a;
      --bg3:     #0d1525;
      --bg4:     #111e35;
      --text:    #cdd6f4;
      --muted:   #6e7a96;
      --border:  rgba(0,245,255,.1);
      --border2: rgba(0,245,255,.22);
      --r:       16px;
      --st:      env(safe-area-inset-top,0px);
      --sb:      env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{height:100%;overflow:hidden}
    body{
      height:100%;min-height:100%;
      background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      font-size:16px;-webkit-font-smoothing:antialiased;
      overflow:hidden;display:flex;flex-direction:column;
      padding-top:var(--st);
    }
    /* grid bg */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        linear-gradient(rgba(0,245,255,.028) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,245,255,.028) 1px,transparent 1px);
      background-size:44px 44px;
    }

    /* ── NAV ── */
    #nav{
      position:relative;z-index:10;
      display:flex;align-items:center;gap:.6rem;
      padding:.75rem 1.1rem;
      background:rgba(5,8,16,.92);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    #nav-back{
      display:flex;align-items:center;gap:.3rem;
      color:var(--muted);text-decoration:none;
      font-size:.7rem;letter-spacing:.07em;text-transform:uppercase;
      transition:color .2s;flex-shrink:0;
    }
    #nav-back:hover{color:var(--cyan)}
    #nav-brand{
      flex:1;font-size:.95rem;font-weight:800;
      letter-spacing:-.01em;color:#fff;
    }
    #nav-brand span{color:var(--cyan)}
    #day-tag{
      font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
      padding:.22rem .7rem;border-radius:20px;
      background:rgba(0,245,255,.1);color:var(--cyan);
      border:1px solid rgba(0,245,255,.2);
    }
    #btn-install{
      display:none;align-items:center;gap:.35rem;
      background:var(--cyan);color:#050810;border:none;border-radius:6px;
      padding:.4rem .85rem;font-size:.72rem;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase;
      cursor:pointer;font-family:inherit;
      box-shadow:0 0 14px rgba(0,245,255,.3);transition:all .2s;
    }
    #btn-install.on{display:flex}
    #btn-install:hover{background:#fff}

    /* ── DECK AREA ── */
    #deck-area{
      position:relative;z-index:1;
      flex:1;display:flex;flex-direction:column;
      overflow:hidden;
    }

    /* date strip */
    #date-strip{
      display:flex;align-items:center;justify-content:space-between;
      padding:.65rem 1.1rem .3rem;flex-shrink:0;
    }
    #date-strip .ds-label{
      font-size:.68rem;font-weight:700;letter-spacing:.12em;
      text-transform:uppercase;color:var(--muted);
    }
    #count-badge{
      font-size:.68rem;font-weight:700;
      padding:.18rem .55rem;border-radius:20px;
      background:rgba(0,245,255,.08);color:var(--cyan);
      border:1px solid rgba(0,245,255,.15);
    }

    /* ── CARD TRACK ── */
    #track-wrap{
      flex:1;overflow:hidden;position:relative;
      padding:.3rem 0 .6rem;
    }
    #track{
      display:flex;gap:1rem;
      height:100%;
      padding:0 1.1rem;
      overflow-x:auto;overflow-y:hidden;
      scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      align-items:stretch;
    }
    #track::-webkit-scrollbar{display:none}

    /* ── APPOINTMENT CARD ── */
    .acard{
      flex-shrink:0;
      width:calc(min(280px, 78vw));
      background:var(--bg2);
      border:1px solid var(--border);
      border-radius:var(--r);
      overflow:hidden;
      scroll-snap-align:start;
      display:flex;flex-direction:column;
      transition:border-color .2s,box-shadow .2s;
      animation:cardIn .3s ease both;
    }
    .acard:hover{border-color:var(--border2);box-shadow:0 8px 30px rgba(0,0,0,.4)}
    .acard.past{opacity:.6}
    @keyframes cardIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}

    .acard-stripe{height:3px;width:100%;flex-shrink:0}
    .stripe-today  {background:var(--mag)}
    .stripe-soon   {background:var(--cyan)}
    .stripe-tmrw   {background:var(--amber)}
    .stripe-past   {background:var(--muted);opacity:.3}
    .stripe-future {background:var(--muted);opacity:.25}

    .acard-body{padding:.9rem 1rem;flex:1;display:flex;flex-direction:column;gap:.45rem}

    .acard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
    .acard-name{font-size:.95rem;font-weight:800;color:#fff;line-height:1.2}
    .acard-ort {font-size:.72rem;color:var(--muted);margin-top:.12rem}

    .acard-lbl{
      flex-shrink:0;
      font-size:.6rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
      padding:.18rem .55rem;border-radius:20px;margin-top:.1rem;
    }
    .lbl-today {background:rgba(255,45,120,.15);color:var(--mag);border:1px solid rgba(255,45,120,.3)}
    .lbl-soon  {background:rgba(0,245,255,.1); color:var(--cyan);border:1px solid rgba(0,245,255,.2)}
    .lbl-tmrw  {background:rgba(255,184,48,.1);color:var(--amber);border:1px solid rgba(255,184,48,.25)}
    .lbl-past  {background:rgba(110,122,150,.1);color:var(--muted);border:1px solid rgba(110,122,150,.2)}

    .acard-time{
      font-size:2.4rem;font-weight:800;
      font-variant-numeric:tabular-nums;
      letter-spacing:-.03em;line-height:1;
    }
    .time-today {color:var(--mag)}
    .time-soon  {color:var(--cyan)}
    .time-tmrw  {color:var(--amber)}
    .time-past  {color:var(--muted);opacity:.55}
    .time-none  {color:var(--muted)}

    .acard-date{font-size:.75rem;color:var(--muted);margin-top:.1rem}

    .acard-note{
      font-size:.78rem;color:var(--muted);line-height:1.5;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
      flex:1;
    }

    .acard-footer{
      margin-top:auto;padding-top:.6rem;
      border-top:1px solid var(--border);
      display:flex;align-items:center;gap:.4rem;
    }

    .btn-call{
      flex:1;display:flex;align-items:center;gap:.4rem;
      background:rgba(0,245,255,.07);border:1px solid var(--border2);
      border-radius:9px;padding:.5rem .7rem;
      color:var(--cyan);font-size:.78rem;font-weight:700;
      cursor:pointer;font-family:inherit;transition:all .2s;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .btn-call:hover{background:rgba(0,245,255,.15);box-shadow:0 0 14px rgba(0,245,255,.15)}

    .btn-ic{
      width:34px;height:34px;border-radius:8px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      border:1px solid var(--border);background:var(--bg3);
      color:var(--muted);cursor:pointer;font-family:inherit;
      transition:all .2s;
    }
    .btn-ic:hover{border-color:var(--cyan);color:var(--cyan)}
    .btn-ic.del:hover{border-color:var(--mag);color:var(--mag)}

    /* + ADD CARD */
    .acard-add{
      flex-shrink:0;
      width:calc(min(160px, 44vw));
      background:transparent;
      border:1.5px dashed rgba(0,245,255,.2);
      border-radius:var(--r);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:.6rem;cursor:pointer;scroll-snap-align:start;
      transition:all .25s;color:var(--muted);
      font-size:.8rem;font-weight:600;letter-spacing:.04em;
      padding:1rem;text-align:center;
    }
    .acard-add:hover{
      border-color:rgba(0,245,255,.5);color:var(--cyan);
      background:rgba(0,245,255,.04);
    }
    .acard-add svg{opacity:.4;transition:opacity .2s}
    .acard-add:hover svg{opacity:1}

    /* ── BOTTOM TOOLBAR ── */
    #bottom{
      position:relative;z-index:10;
      display:flex;align-items:center;gap:.5rem;
      padding:.7rem 1.1rem calc(.7rem + var(--sb));
      background:rgba(5,8,16,.92);backdrop-filter:blur(20px);
      border-top:1px solid var(--border);flex-shrink:0;
    }
    .btn-bar{
      display:inline-flex;align-items:center;gap:.4rem;
      background:var(--bg3);border:1px solid var(--border);
      border-radius:8px;padding:.52rem .95rem;
      color:var(--muted);font-size:.76rem;font-weight:600;
      cursor:pointer;font-family:inherit;transition:all .2s;
      letter-spacing:.03em;
    }
    .btn-bar:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,.05)}
    .btn-bar.danger{border-color:rgba(255,45,120,.2);color:rgba(255,45,120,.65)}
    .btn-bar.danger:hover{border-color:var(--mag);color:var(--mag);background:rgba(255,45,120,.06)}
    .spacer{flex:1}
    #btn-add-main{
      display:flex;align-items:center;gap:.4rem;
      background:var(--cyan);color:#050810;border:none;
      border-radius:8px;padding:.52rem 1.1rem;
      font-size:.8rem;font-weight:800;cursor:pointer;
      font-family:inherit;transition:all .2s;letter-spacing:.04em;
      box-shadow:0 0 18px rgba(0,245,255,.3);
    }
    #btn-add-main:hover{background:#fff;box-shadow:0 0 28px rgba(0,245,255,.5)}

    /* ── CARD DOTS ── */
    #card-dots{
      display:flex;justify-content:center;align-items:center;
      gap:.38rem;padding:.35rem 0 .15rem;flex-shrink:0;min-height:20px;
    }
    .cdot{
      width:5px;height:5px;border-radius:50%;flex-shrink:0;
      background:rgba(0,245,255,.18);transition:all .28s cubic-bezier(.4,0,.2,1);
      cursor:pointer;
    }
    .cdot.on{background:var(--cyan);width:20px;border-radius:3px;}

    /* ── EMPTY STATE ── */
    #empty{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      flex:1;gap:.8rem;color:var(--muted);text-align:center;padding:2rem;
    }
    #empty.on{display:flex}
    #empty svg{opacity:.15}
    #empty strong{color:var(--text);font-size:1rem;display:block}
    #empty span{font-size:.85rem;line-height:1.6}

    /* ── CRISIS ── */
    #crisis{
      position:relative;z-index:1;
      display:flex;align-items:center;gap:.7rem;
      margin:.3rem 1.1rem .4rem;
      background:rgba(255,45,120,.06);
      border:1px solid rgba(255,45,120,.2);
      border-radius:10px;padding:.7rem 1rem;flex-shrink:0;
    }
    #crisis strong{font-size:.78rem;color:#fff;display:block}
    #crisis small  {font-size:.68rem;color:var(--muted)}
    #crisis-text{flex:1}
    #btn-crisis{
      display:flex;align-items:center;gap:.3rem;
      background:var(--mag);color:#fff;border:none;
      border-radius:7px;padding:.45rem .9rem;
      font-size:.75rem;font-weight:700;cursor:pointer;
      font-family:inherit;text-decoration:none;
      transition:all .2s;white-space:nowrap;flex-shrink:0;
    }
    #btn-crisis:hover{background:#ff4d8d}

    /* ── SHEET ── */
    #backdrop{
      display:none;position:fixed;inset:0;z-index:200;
      background:rgba(0,0,0,.65);backdrop-filter:blur(5px);
    }
    #backdrop.on{display:block}
    #sheet{
      display:none;position:fixed;left:0;right:0;bottom:0;z-index:201;
      background:var(--bg2);border-top:1px solid var(--border2);
      border-radius:18px 18px 0 0;
      padding-bottom:calc(.8rem + var(--sb));
      max-height:94vh;overflow-y:auto;
      transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.23,1);
    }
    #sheet.on{display:block;transform:translateY(0)}
    @media(min-width:520px){
      #sheet{max-width:460px;left:50%;transform:translateX(-50%) translateY(100%);border-radius:18px;bottom:1.5rem}
      #sheet.on{transform:translateX(-50%) translateY(0)}
    }
    .sh-handle{display:flex;justify-content:center;padding:.7rem 0 .3rem}
    .sh-handle div{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,.1)}
    .sh-hdr{
      display:flex;align-items:center;justify-content:space-between;
      padding:.3rem 1.1rem .75rem;border-bottom:1px solid var(--border);
    }
    .sh-title{font-size:.95rem;font-weight:800;color:#fff}
    #btn-sh-close{
      width:28px;height:28px;border-radius:50%;
      background:rgba(255,255,255,.07);border:none;color:var(--muted);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:.9rem;transition:all .2s;
    }
    #btn-sh-close:hover{background:rgba(255,255,255,.12);color:#fff}
    #form{padding:.85rem 1.1rem;display:flex;flex-direction:column;gap:.75rem}
    .fld{display:flex;flex-direction:column;gap:.28rem}
    .fld label{font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
    .fld input,.fld textarea{
      width:100%;background:var(--bg3);border:1px solid var(--border);
      border-radius:9px;padding:.65rem .85rem;color:var(--text);
      font-size:.95rem;font-family:inherit;outline:none;
      transition:border-color .2s,box-shadow .2s;
      -webkit-appearance:none;appearance:none;
    }
    .fld input:focus,.fld textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,245,255,.1)}
    .fld input::placeholder,.fld textarea::placeholder{color:var(--muted);opacity:.6}
    .fld textarea{resize:vertical;min-height:72px;max-height:150px;line-height:1.5}
    .fld-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
    .ferr{font-size:.7rem;color:var(--mag);display:none}
    .ferr.on{display:block}
    .sh-actions{display:flex;gap:.55rem;padding:.6rem 1.1rem 0}
    #btn-save{
      flex:1;background:var(--cyan);color:#050810;border:none;
      border-radius:9px;padding:.75rem;font-size:.88rem;font-weight:800;
      cursor:pointer;font-family:inherit;transition:all .2s;
    }
    #btn-save:hover{background:#fff}
    #btn-cancel{
      background:var(--bg3);border:1px solid var(--border);color:var(--muted);
      border-radius:9px;padding:.75rem 1.1rem;font-size:.88rem;
      font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;
    }
    #btn-cancel:hover{border-color:var(--cyan);color:var(--cyan)}

    /* ── MODAL ── */
    #modal-bg{
      display:none;position:fixed;inset:0;z-index:300;
      background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
      align-items:center;justify-content:center;padding:1rem;
    }
    #modal-bg.on{display:flex}
    #modal{
      background:var(--bg3);border:1px solid var(--border2);border-radius:16px;
      padding:1.6rem;max-width:320px;width:100%;
      box-shadow:0 20px 60px rgba(0,0,0,.7);
      animation:pop .2s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
    #m-icon{font-size:1.8rem;margin-bottom:.55rem}
    #m-title{font-size:.98rem;font-weight:800;color:#fff;margin-bottom:.35rem}
    #m-body{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:1.2rem}
    #m-actions{display:flex;gap:.55rem}
    .mbtn{
      flex:1;border-radius:8px;padding:.65rem;font-size:.83rem;
      font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all .2s;
    }
    .mbtn.ok{background:var(--mag);color:#fff}
    .mbtn.ok:hover{background:#ff4d8d}
    .mbtn.no{background:var(--bg2);border:1px solid var(--border);color:var(--muted)}
    .mbtn.no:hover{border-color:var(--cyan);color:var(--cyan)}

    /* ── TOAST ── */
    #toast{
      position:fixed;top:calc(64px + var(--st));left:50%;
      transform:translateX(-50%) translateY(-6px);z-index:400;
      pointer-events:none;
      background:var(--bg3);border:1px solid var(--border2);
      border-radius:9px;padding:.5rem 1rem;
      font-size:.8rem;font-weight:600;color:var(--text);
      box-shadow:0 6px 24px rgba(0,0,0,.5);
      opacity:0;transition:opacity .18s,transform .18s;
      white-space:nowrap;max-width:calc(100vw - 2rem);
      overflow:hidden;text-overflow:ellipsis;
    }
    #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.s{border-color:rgba(0,255,159,.4);color:var(--green)}
    #toast.e{border-color:rgba(255,45,120,.4);color:var(--mag)}
    #toast.w{border-color:rgba(255,184,48,.4);color:var(--amber)}

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <a id="nav-back" href="../" rel="noopener">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Studio
  </a>
  <div id="nav-brand">Ärzte <span>Tracker</span></div>
  <div id="day-tag">Today</div>
  <button id="btn-install" type="button" aria-label="Install app">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Install
  </button>
</nav>

<!-- DECK AREA -->
<div id="deck-area">
  <div id="date-strip">
    <span class="ds-label" id="today-label">—</span>
    <span id="count-badge">0 appointments</span>
  </div>
  <div id="track-wrap">
    <div id="track" role="list" aria-label="Appointments"></div>
  </div>
  <div id="card-dots" aria-hidden="true"></div>
  <div id="empty" role="status">
    <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <div><strong>No appointments</strong><span>Tap + to add one</span></div>
  </div>
</div>

<!-- CRISIS -->
<div id="crisis" role="region" aria-label="Emergency">
  <span style="font-size:1.2rem;flex-shrink:0">🆘</span>
  <div id="crisis-text">
    <strong>24/7 Crisis Line</strong>
    <small>Austria · 0800 400 120</small>
  </div>
  <a id="btn-crisis" href="tel:+4380040120" rel="noopener" aria-label="Call crisis line">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.61 4.38 2 2 0 0 1 3.58 2h3a2 2 0 0 1 2 1.72c.12.66.29 1.31.5 1.95a2 2 0 0 1-.45 2.11L7.91 9.6a16 16 0 0 0 6 6l.91-1.04a2 2 0 0 1 2.11-.45c.64.21 1.29.38 1.95.5A2 2 0 0 1 22 16.92z"/></svg>
    Call
  </a>
</div>

<!-- BOTTOM BAR -->
<div id="bottom">
  <button class="btn-bar" id="btn-export" type="button">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Backup
  </button>
  <button class="btn-bar" id="btn-import" type="button">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Restore
  </button>
  <div class="spacer"></div>
  <button class="btn-bar danger" id="btn-clear" type="button">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    Clear all
  </button>
  <button id="btn-add-main" type="button" aria-label="Add appointment">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add
  </button>
</div>

<!-- SHEET -->
<div id="backdrop" aria-hidden="true"></div>
<div id="sheet" role="dialog" aria-modal="true" aria-labelledby="sh-title">
  <div class="sh-handle"><div></div></div>
  <div class="sh-hdr">
    <span class="sh-title" id="sh-title">New Appointment</span>
    <button id="btn-sh-close" type="button" aria-label="Close">✕</button>
  </div>
  <form id="form" novalidate autocomplete="off">
    <div class="fld">
      <label for="f-name">Doctor / Contact</label>
      <input id="f-name" type="text" placeholder="Dr. Fischer" maxlength="100" autocomplete="off" />
      <span class="ferr" id="err-name" role="alert">Name is required</span>
    </div>
    <div class="fld">
      <label for="f-ort">Location / Specialty</label>
      <input id="f-ort" type="text" placeholder="Innsbruck · Cardiology" maxlength="100" autocomplete="off" />
    </div>
    <div class="fld">
      <label for="f-tel">Phone Number</label>
      <input id="f-tel" type="tel" placeholder="+43 512 …" maxlength="20" inputmode="tel" autocomplete="off" />
      <span class="ferr" id="err-tel" role="alert">Enter a valid number</span>
    </div>
    <div class="fld-row">
      <div class="fld"><label for="f-date">Date</label><input id="f-date" type="date" /></div>
      <div class="fld"><label for="f-time">Time</label><input id="f-time" type="time" /></div>
    </div>
    <div class="fld">
      <label for="f-note">Note</label>
      <textarea id="f-note" placeholder="Optional notes…" maxlength="350"></textarea>
    </div>
    <div class="sh-actions">
      <button id="btn-save" type="submit">Save</button>
      <button id="btn-cancel" type="button">Cancel</button>
    </div>
  </form>
</div>

<!-- MODAL -->
<div id="modal-bg" role="presentation">
  <div id="modal" role="alertdialog" aria-modal="true" aria-labelledby="m-title">
    <div id="m-icon" aria-hidden="true"></div>
    <div id="m-title"></div>
    <div id="m-body"></div>
    <div id="m-actions"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- FILE INPUT -->
<input type="file" id="file-input" accept="application/json,.json" aria-hidden="true" tabindex="-1" style="display:none" />

<script>
'use strict';

/* ── CONSTANTS ── */
const VERSION = '3.2.0';
const KEY     = 'at_v3';
const ALLOWED = ['id','name','ort','tel','date','time','note'];
const MAX_NOTE = 350;

const DEMO = [
  { id:'demo1', name:'Dr. Kovář',         ort:'Innsbruck · Kardiologie',  tel:'+43 512 504 0',    date:'', time:'08:30', note:'Nüchtern kommen. EKG mitbringen.' },
  { id:'demo2', name:'Dr. Berger',         ort:'Hall i.T. · Neurologie',   tel:'+43 5223 509',     date:'', time:'11:00', note:'' },
  { id:'demo3', name:'MRI – Klinik Mitte', ort:'Innsbruck · Radiologie',   tel:'+43 512 360 00',   date:'', time:'09:15', note:'Keine Metallteile. 30 min einplanen.' },
];

/* ── VALIDATION ── */
const isDate = s => s && /^\d{4}-\d{2}-\d{2}$/.test(s) && !isNaN(new Date(s+'T00:00:00').getTime());
const isTime = s => s && /^([01]\d|2[0-3]):[0-5]\d$/.test(s);
const isTel  = s => s && /^\+?[\d\s\-().]{6,20}$/.test(s.trim());
const san    = (s, n=500) => typeof s==='string' ? s.trim().slice(0,n) : '';

/* ── STORAGE ── */
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return null; // null = use demo
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return null;
    return parsed.map(scrub);
  } catch { return null; }
}
function scrub(d) {
  const c = Object.create(null);
  ALLOWED.forEach(k => c[k] = d[k] ?? '');
  c.id   = san(c.id, 64) || uid();
  c.name = san(c.name, 100);
  c.ort  = san(c.ort,  100);
  c.tel  = san(c.tel,   20);
  c.note = san(c.note, MAX_NOTE);
  c.date = isDate(c.date) ? c.date : '';
  c.time = isTime(c.time) ? c.time : '';
  return c;
}
function persist(arr) {
  try { localStorage.setItem(KEY, JSON.stringify(arr)); }
  catch(e) { if(e.name==='QuotaExceededError') toast('Storage full — backup first','e'); }
}
function uid() { return crypto.randomUUID?.() ?? (Date.now()+Math.random()).toString(36); }

/* ── STATE ── */
const DEMO_IDS = new Set(['demo1','demo2','demo3']);
function freshDemo() {
  const today = new Date(); today.setHours(0,0,0,0);
  const tom   = new Date(today); tom.setDate(tom.getDate()+1);
  const fmt   = dt => dt.toISOString().split('T')[0];
  return DEMO.map(d => {
    if (d.id === 'demo1') return {...d, date: fmt(today)};
    if (d.id === 'demo2') return {...d, date: fmt(today)};
    if (d.id === 'demo3') return {...d, date: fmt(tom)};
    return d;
  });
}
let _saved = load();
// treat pure-demo localStorage as first run so dates always refresh
if (_saved !== null && _saved.length === 3 && _saved.every(d => DEMO_IDS.has(d.id))) _saved = null;
let data = _saved ?? freshDemo();
let editId = null;

/* ── SORT ── */
function sorted(arr) {
  const now = Date.now();
  return [...arr].sort((a,b) => {
    const ta = a.date ? new Date(a.date+'T'+(a.time||'23:59')).getTime() : Infinity;
    const tb = b.date ? new Date(b.date+'T'+(b.time||'23:59')).getTime() : Infinity;
    const pastA = a.date && ta < now;
    const pastB = b.date && tb < now;
    if (pastA !== pastB) return pastA ? 1 : -1; // future first, past last
    if (pastA && pastB)  return tb - ta;         // both past: most recent first
    return ta - tb;                               // both future: soonest first
  });
}

/* ── LABEL ── */
function getLabel(dateStr) {
  if (!isDate(dateStr)) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const tom = new Date(now); tom.setDate(tom.getDate()+1);
  const d   = new Date(dateStr+'T00:00:00'); d.setHours(0,0,0,0);
  const t   = d.getTime();
  if (t === now.getTime()) return {text:'Today',    key:'today'};
  if (t === tom.getTime()) return {text:'Tomorrow', key:'tmrw'};
  if (t >  now.getTime()) return {text: d.toLocaleDateString('en',{month:'short',day:'numeric'}), key:'soon'};
  return {text:'Past', key:'past'};
}

/* ── TOAST ── */
let toastT = null;
function toast(msg, type='s') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'on '+type;
  clearTimeout(toastT);
  toastT = setTimeout(() => t.className='', 3000);
}

/* ── MODAL ── */
function modal({icon, title, body, ok, onOk}) {
  document.getElementById('m-icon').textContent  = icon||'';
  document.getElementById('m-title').textContent = title||'';
  document.getElementById('m-body').textContent  = body||'';
  const acts = document.getElementById('m-actions');
  acts.innerHTML = '';
  const no = document.createElement('button');
  no.className = 'mbtn no'; no.textContent = 'Cancel';
  no.addEventListener('click', closeModal);
  acts.appendChild(no);
  const yes = document.createElement('button');
  yes.className = 'mbtn ok'; yes.textContent = ok||'Confirm';
  yes.addEventListener('click', () => { closeModal(); onOk?.(); });
  acts.appendChild(yes);
  document.getElementById('modal-bg').classList.add('on');
  yes.focus();
}
function closeModal() { document.getElementById('modal-bg').classList.remove('on'); }

/* ── DOM HELPERS ── */
function mkEl(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt !== undefined) e.textContent = String(txt);
  return e;
}
function mkSvg(path, w=14, h=14) {
  const ns='http://www.w3.org/2000/svg';
  const s = document.createElementNS(ns,'svg');
  s.setAttribute('width',w); s.setAttribute('height',h);
  s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('fill','none');
  s.setAttribute('stroke','currentColor'); s.setAttribute('stroke-width','2');
  s.setAttribute('aria-hidden','true');
  s.innerHTML = path; // static paths only
  return s;
}

/* ── RENDER ── */
function render() {
  const track = document.getElementById('track');
  const empty = document.getElementById('empty');
  const s     = sorted(data);

  track.innerHTML = '';

  if (s.length === 0) {
    empty.classList.add('on');
  } else {
    empty.classList.remove('on');
    const frag = document.createDocumentFragment();
    s.forEach(d => frag.appendChild(makeCard(d)));
    // + add card at end
    const addCard = mkEl('div','acard-add');
    addCard.setAttribute('role','button');
    addCard.setAttribute('tabindex','0');
    addCard.setAttribute('aria-label','Add appointment');
    addCard.appendChild(mkSvg('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',28,28));
    addCard.appendChild(mkEl('span','','New'));
    addCard.addEventListener('click', () => openSheet(null));
    addCard.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();openSheet(null);} });
    frag.appendChild(addCard);
    track.appendChild(frag);
  }

  // update header
  const count = s.length;
  document.getElementById('count-badge').textContent = count + (count===1?' appointment':' appointments');
  document.getElementById('today-label').textContent =
    new Date().toLocaleDateString('en',{weekday:'long',day:'numeric',month:'long'});

  // dots
  renderDots(count);
  // reset scroll to first card
  document.getElementById('track').scrollLeft = 0;
}

function makeCard(d) {
  const lbl     = getLabel(d.date);
  const key     = lbl?.key || 'future';
  const stripeM = {'today':'stripe-today','soon':'stripe-soon','tmrw':'stripe-tmrw','past':'stripe-past','future':'stripe-future'};
  const timeM   = {'today':'time-today',  'soon':'time-soon',  'tmrw':'time-tmrw',  'past':'time-past', 'future':'time-none'};
  const lblM    = {'today':'lbl-today',   'soon':'lbl-soon',   'tmrw':'lbl-tmrw',   'past':'lbl-past'};

  const card = mkEl('div', key==='past' ? 'acard past' : 'acard');
  card.setAttribute('role','listitem');
  card.dataset.id = d.id;

  // stripe
  card.appendChild(mkEl('div','acard-stripe '+(stripeM[key]||'stripe-future')));

  const body = mkEl('div','acard-body');

  // top
  const top  = mkEl('div','acard-top');
  const info = mkEl('div','acard-info');
  info.appendChild(mkEl('div','acard-name', d.name||'Unnamed'));
  if (d.ort) info.appendChild(mkEl('div','acard-ort', d.ort));
  top.appendChild(info);
  if (lbl && lblM[lbl.key]) {
    top.appendChild(mkEl('div','acard-lbl '+lblM[lbl.key], lbl.text));
  }
  body.appendChild(top);

  // time
  if (d.time || d.date) {
    const wrap = mkEl('div');
    if (d.time) wrap.appendChild(mkEl('div','acard-time '+(timeM[key]||'time-none'), d.time));
    if (d.date) {
      const dt = new Date(d.date+'T00:00:00');
      wrap.appendChild(mkEl('div','acard-date', dt.toLocaleDateString('en',{weekday:'short',day:'numeric',month:'short'})));
    }
    body.appendChild(wrap);
  }

  // note
  if (d.note) body.appendChild(mkEl('div','acard-note', d.note));

  // footer
  const footer = mkEl('div','acard-footer');

  if (d.tel) {
    const callBtn = mkEl('button','btn-call');
    callBtn.type = 'button';
    callBtn.dataset.action = 'call';
    callBtn.dataset.id = d.id;
    callBtn.setAttribute('aria-label', 'Call '+String(d.name));
    callBtn.appendChild(mkSvg('<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.61 4.38 2 2 0 0 1 3.58 2h3a2 2 0 0 1 2 1.72c.12.66.29 1.31.5 1.95a2 2 0 0 1-.45 2.11L7.91 9.6a16 16 0 0 0 6 6l.91-1.04a2 2 0 0 1 2.11-.45c.64.21 1.29.38 1.95.5A2 2 0 0 1 22 16.92z"/>',13,13));
    callBtn.appendChild(mkEl('span','', d.tel));
    footer.appendChild(callBtn);
  }

  const editBtn = mkEl('button','btn-ic');
  editBtn.type='button'; editBtn.dataset.action='edit'; editBtn.dataset.id=d.id;
  editBtn.setAttribute('aria-label','Edit '+String(d.name));
  editBtn.appendChild(mkSvg('<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>'));
  footer.appendChild(editBtn);

  const delBtn = mkEl('button','btn-ic del');
  delBtn.type='button'; delBtn.dataset.action='del'; delBtn.dataset.id=d.id;
  delBtn.setAttribute('aria-label','Delete '+String(d.name));
  delBtn.appendChild(mkSvg('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>'));
  footer.appendChild(delBtn);

  body.appendChild(footer);
  card.appendChild(body);
  return card;
}

/* ── DOTS ── */
function renderDots(count) {
  const el = document.getElementById('card-dots');
  el.innerHTML = '';
  if (count <= 1) return;
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'cdot' + (i === 0 ? ' on' : '');
    d.addEventListener('click', () => scrollToCard(i));
    el.appendChild(d);
  }
}

function getActiveIdx() {
  const track = document.getElementById('track');
  const cards = track.querySelectorAll('.acard');
  if (!cards.length) return 0;
  const card0 = cards[0];
  const cardW = card0.offsetWidth + 16; // 1rem gap
  return Math.min(Math.round(track.scrollLeft / cardW), cards.length - 1);
}

function updateDots() {
  const idx  = getActiveIdx();
  document.querySelectorAll('.cdot').forEach((d, i) => d.classList.toggle('on', i === idx));
}

function scrollToCard(idx) {
  const track = document.getElementById('track');
  const cards = track.querySelectorAll('.acard');
  if (!cards[idx]) return;
  cards[idx].scrollIntoView({behavior:'smooth', block:'nearest', inline:'start'});
}

document.getElementById('track').addEventListener('scroll', updateDots, {passive:true});

/* ── KEYBOARD NAV ── */
document.addEventListener('keydown', e => {
  if (document.getElementById('sheet').classList.contains('on')) return;
  if (document.getElementById('modal-bg').classList.contains('on')) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); scrollToCard(getActiveIdx() + 1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); scrollToCard(getActiveIdx() - 1); }
});

/* ── EVENT DELEGATION ── */
document.getElementById('track').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const {action, id} = btn.dataset;
  if (action==='call')  doCall(id);
  if (action==='edit')  openSheet(id);
  if (action==='del')   confirmDel(id);
});

/* ── CALL ── */
function doCall(id) {
  const d = data.find(x => x.id===id);
  if (!d?.tel) return;
  if (!isTel(d.tel)) { toast('Invalid phone number','e'); return; }
  // strip only whitespace and formatting chars — preserve leading + or 00
  const clean = d.tel.trim().replace(/[\s\-().]/g,'');
  window.location.href = 'tel:' + clean;
}

/* ── SHEET ── */
function openSheet(id) {
  editId = id||null;
  const d = id ? data.find(x=>x.id===id) : null;
  document.getElementById('sh-title').textContent = d ? 'Edit Appointment' : 'New Appointment';
  document.getElementById('f-name').value = d?.name||'';
  document.getElementById('f-ort').value  = d?.ort ||'';
  document.getElementById('f-tel').value  = d?.tel ||'';
  document.getElementById('f-date').value = d?.date||'';
  document.getElementById('f-time').value = d?.time||'';
  document.getElementById('f-note').value = d?.note||'';
  document.getElementById('err-name').classList.remove('on');
  document.getElementById('err-tel').classList.remove('on');
  document.getElementById('backdrop').classList.add('on');
  document.getElementById('sheet').classList.add('on');
  setTimeout(()=>document.getElementById('f-name').focus(),80);
}
function closeSheet() {
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('backdrop').classList.remove('on');
}
function submitForm(e) {
  e?.preventDefault();
  const name = san(document.getElementById('f-name').value,100);
  const ort  = san(document.getElementById('f-ort').value, 100);
  const tel  = san(document.getElementById('f-tel').value,  20);
  const date = document.getElementById('f-date').value;
  const time = document.getElementById('f-time').value;
  const note = san(document.getElementById('f-note').value, MAX_NOTE);
  let ok = true;
  if (!name) { document.getElementById('err-name').classList.add('on'); document.getElementById('f-name').focus(); ok=false; }
  else document.getElementById('err-name').classList.remove('on');
  if (tel && !isTel(tel)) { document.getElementById('err-tel').classList.add('on'); if(ok) document.getElementById('f-tel').focus(); ok=false; }
  else document.getElementById('err-tel').classList.remove('on');
  if (!ok) return;
  const entry = { id: editId||uid(), name, ort, tel, date:isDate(date)?date:'', time:isTime(time)?time:'', note };
  if (editId) { const i=data.findIndex(x=>x.id===editId); if(i!==-1) data[i]=entry; }
  else data.push(entry);
  persist(data); render(); closeSheet();
  toast(editId?'Updated':'Appointment added');
}

/* ── DELETE ── */
function confirmDel(id) {
  const d = data.find(x=>x.id===id);
  if (!d) return;
  modal({
    icon:'🗑', title:'Delete appointment?',
    body:'"'+String(d.name)+'" will be removed.',
    ok:'Delete',
    onOk: () => { data=data.filter(x=>x.id!==id); persist(data); render(); toast('Deleted','w'); }
  });
}

/* ── CLEAR ALL ── */
function clearAll() {
  modal({
    icon:'⚠️', title:'Clear all data?',
    body:'All appointments, cache, and storage will be permanently deleted. This cannot be undone.',
    ok:'Yes, clear everything',
    onOk: () => modal({
      icon:'🗑', title:'Last chance — are you sure?',
      body:'This will wipe all local data immediately.',
      ok:'Delete permanently',
      onOk: async () => {
        localStorage.clear(); sessionStorage.clear();
        document.cookie.split(';').forEach(c => {
          const k=c.split('=')[0].trim();
          document.cookie=k+'=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
        });
        if ('caches' in window) {
          const keys = await caches.keys().catch(()=>[]);
          await Promise.all(keys.map(k=>caches.delete(k).catch(()=>{})));
        }
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations().catch(()=>[]);
          await Promise.all(regs.map(r=>r.unregister().catch(()=>{})));
        }
        toast('All data cleared — reloading…','w');
        setTimeout(()=>location.replace(location.href),1400);
      }
    })
  });
}

/* ── EXPORT ── */
function doExport() {
  if (!data.length) { toast('Nothing to export','w'); return; }
  const out  = JSON.stringify({version:VERSION,exported:new Date().toISOString(),appointments:data},null,2);
  const blob = new Blob([out],{type:'application/json;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'),{href:url,download:'aerzte-backup_'+new Date().toISOString().split('T')[0]+'.json',style:'display:none'});
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Backup saved');
}

/* ── IMPORT ── */
function doImport() { document.getElementById('file-input').click(); }
document.getElementById('file-input').addEventListener('change', function() {
  const file=this.files[0]; this.value='';
  if (!file) return;
  if (file.type!=='application/json'&&!file.name.endsWith('.json')) { toast('Only .json files','e'); return; }
  if (file.size>1024*1024) { toast('File too large (max 1 MB)','e'); return; }
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const raw=JSON.parse(ev.target.result);
      const arr=(raw.appointments??raw.doctors??[]);
      if (!Array.isArray(arr)) throw 0;
      const imp=arr.map(scrub);
      modal({
        icon:'📥',title:'Restore backup?',
        body:imp.length+' appointments found. This will replace current data.',
        ok:'Restore',
        onOk:()=>{ data=imp; persist(data); render(); toast(imp.length+' appointments restored'); }
      });
    } catch { toast('Invalid backup file','e'); }
  };
  r.onerror=()=>toast('Could not read file','e');
  r.readAsText(file);
});

/* ── BUTTON WIRING ── */
document.getElementById('btn-add-main').addEventListener('click', ()=>openSheet(null));
document.getElementById('btn-sh-close').addEventListener('click', closeSheet);
document.getElementById('btn-cancel').addEventListener('click',   closeSheet);
document.getElementById('form').addEventListener('submit',        submitForm);
document.getElementById('backdrop').addEventListener('click',     closeSheet);
document.getElementById('modal-bg').addEventListener('click', e=>{ if(e.target===document.getElementById('modal-bg')) closeModal(); });
document.getElementById('btn-export').addEventListener('click', doExport);
document.getElementById('btn-import').addEventListener('click', doImport);
document.getElementById('btn-clear').addEventListener('click',  clearAll);

document.addEventListener('keydown', e=>{
  if (e.key==='Escape') {
    if (document.getElementById('modal-bg').classList.contains('on')) closeModal();
    else if (document.getElementById('sheet').classList.contains('on')) closeSheet();
  }
});

/* ── PWA ── */
let prompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();prompt=e;document.getElementById('btn-install').classList.add('on');});
document.getElementById('btn-install').addEventListener('click',async()=>{
  if(!prompt)return; prompt.prompt();
  const{outcome}=await prompt.userChoice;
  if(outcome==='accepted'){document.getElementById('btn-install').classList.remove('on');prompt=null;}
});
